  <!-- Pre-bundle paint: match src/styles/index.css body (avoids empty “purple screen” if JS fails to load). -->
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <script>
    (function() {
      try {
        if (window.history.scrollRestoration !== undefined) window.history.scrollRestoration = 'manual';
      } catch (e) {}
    })();
  </script>
  <div id="root"></div>
  <!-- Miniapp-only first paint (matches App.jsx getUseMiniappLayout heuristics): logo before bundle loads -->
  <script>
    (function () {
      var mini = false;
      try {
        var host = (window.location && window.location.hostname) ? String(window.location.hostname).toLowerCase() : '';
        if (host === 'localhost' || host === '127.0.0.1' || host === '[::1]' || host.slice(-10) === '.localhost') return;
        mini = window.location !== window.parent.location || window.parent !== window;
        if (!mini) {
          var h = (window.location.href || '').toLowerCase();
          mini = h.indexOf('farcaster.xyz') >= 0 || h.indexOf('warpcast.com') >= 0;
        }
        if (!mini && typeof navigator !== 'undefined' && navigator.userAgent) {
          var ua = navigator.userAgent.toLowerCase();
          // Align with src/utils/xpUtils isLikelyBaseApp — do not use ua.indexOf('app') (matches "Apple" in AppleWebKit).
          mini = ua.indexOf('coinbase') >= 0 || ua.indexOf('base wallet') >= 0 || ua.indexOf('cbwallet') >= 0 || ua.indexOf('in-app') >= 0;
        }
      } catch (e) { mini = false; }
      if (!mini) return;
      var root = document.getElementById('root');
      if (!root) return;
      var wrap = document.createElement('div');
      wrap.id = 'app-initial-splash';
      wrap.setAttribute('aria-hidden', 'true');
      wrap.style.cssText = 'position:fixed;inset:0;z-index:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3b82f6 0%,#1e40af 50%,#1d4ed8 100%);';
      var img = document.createElement('img');
      img.src = '/basehub-icon.png?v=1';
      img.alt = '';
      img.decoding = 'async';
      img.setAttribute('fetchpriority', 'high');
      img.style.cssText = 'width:auto;height:min(38vh,200px);max-width:min(72vw,280px);object-fit:contain;';
      wrap.appendChild(img);
      root.appendChild(wrap);
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    (function() {
      function top() {
        try {
          window.scrollTo(0, 0);
          if (document.documentElement) document.documentElement.scrollTop = 0;
          if (document.body) document.body.scrollTop = 0;
        } catch (e) {}
      }
      top();
      window.addEventListener('DOMContentLoaded', top);
      window.addEventListener('load', function() { top(); setTimeout(top, 0); setTimeout(top, 100); });
      window.addEventListener('pageshow', function(ev) { top(); if (ev.persisted) setTimeout(top, 50); });
    })();
  </script>
  
  <!-- Block Coinbase analytics errors -->
  <script>
    // Override console.error to filter out Coinbase analytics errors
    const originalError = console.error;
    console.error = function(...args) {
      const message = args.join(' ');
      if (message.includes('cca-lite.coinbase.com') || 
          message.includes('ERR_BLOCKED_BY_CLIENT') ||
          message.includes('ERR_ABORTED 401') ||
          message.includes('warpcast.com') ||
          message.includes('user-app-context') ||
          message.includes('onboarding-state') ||
          message.includes('MetaMask encountered an error') ||
          message.includes('Cannot set property ethereum') ||
          message.includes('which has only a getter')) {
        return; // Don't log these errors
      }
      originalError.apply(console, args);
    };
    
    // NOTE: Do not override window.fetch globally.
    // Blocking third-party calls here can unintentionally break app data requests.
  </script>
</body>
